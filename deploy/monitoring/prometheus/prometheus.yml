# Prometheus configuration for NC monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'nc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nc:8080']
        labels:
          service: 'nc'
          environment: 'production'

