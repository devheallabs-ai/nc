# Alertmanager Configuration for NC
# Configure receivers with your actual endpoints

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 30m

receivers:
  - name: 'default'
    # Configure webhook, email, Slack, PagerDuty, etc.
    # webhook_configs:
    #   - url: 'http://your-webhook-endpoint/alerts'

  - name: 'critical'
    # PagerDuty for critical alerts
    # pagerduty_configs:
    #   - service_key: '<your-pagerduty-key>'
    # Or Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#nc-alerts-critical'
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'

  - name: 'warning'
    # Slack for warnings
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#nc-alerts'
    #     title: '{{ .CommonAnnotations.summary }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
