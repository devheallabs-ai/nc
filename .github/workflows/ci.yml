name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  engine-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev python3 python3-pip
      - name: Build engine
        run: |
          cd engine
          make clean
          make
      - name: Run unit tests
        run: |
          cd engine
          make test-unit
      - name: Run language tests
        run: ./engine/build/nc test
      - name: Run external validation
        run: python3 tests/validate_nc.py --nc engine/build/nc

  package-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: python -m pip install --upgrade pip build
      - name: Build pip package
        run: python -m build packages/pip
      - name: Build Python bindings package
        run: python -m build bindings/python
