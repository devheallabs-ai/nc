name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository structure
        run: |
          echo "Checking critical files..."
          for f in README.md LICENSE INSTALL.md CHANGELOG.md SECURITY.md CONTRIBUTING.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All critical files present."
      - name: Validate NC examples
        run: |
          echo "Checking NC example files..."
          count=$(find examples -name '*.nc' 2>/dev/null | wc -l)
          echo "Found $count .nc example files"
          if [ "$count" -eq 0 ]; then
            echo "WARNING: No .nc examples found"
          fi
      - name: Validate grammar files
        run: |
          echo "Checking grammar definitions..."
          ls -la grammar/ || echo "No grammar directory"
      - name: Check for secrets or private files
        run: |
          echo "Scanning for accidentally committed secrets..."
          if grep -rl 'PRIVATE KEY' --include='*.nc' --include='*.py' --include='*.c' . 2>/dev/null; then
            echo "FAIL: Found potential private key"
            exit 1
          fi
          if [ -d "_private" ]; then
            echo "FAIL: _private directory should not be in public repo"
            exit 1
          fi
          echo "No secrets found."

  package-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: python -m pip install --upgrade pip build
      - name: Build pip package
        run: python -m build packages/pip
      - name: Build Python bindings package
        run: python -m build bindings/python
